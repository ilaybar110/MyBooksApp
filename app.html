<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>BookMarks</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Serif+Hebrew:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --bg: #F7F4EF;
      --bg2: #EDEAE3;
      --card: #FFFFFF;
      --t1: #1A1615;
      --t2: #6B5D56;
      --t3: #9E8E86;
      --ac: #C2651A;
      --ac2: #A8530E;
      --gold: #C4933A;
      --bd: #E3DCD4;
      --tag: #EAE3D8;
      --err: #B83232;
      --tr: 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--t1);
      font-family: 'Outfit', sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
    }
    #root { min-height: 100dvh; display: flex; flex-direction: column; }
    .page { max-width: 480px; margin: 0 auto; width: 100%; min-height: 100dvh; position: relative; background: var(--bg); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 2px; }

    /* Transitions */
    button, a, input, select, textarea { transition: all var(--tr); }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      border: none; border-radius: 10px; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 14px;
      min-height: 44px; padding: 0 20px;
      transition: transform var(--tr), box-shadow var(--tr), background var(--tr), opacity var(--tr);
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }
    .btn-p { background: var(--ac); color: #fff; }
    .btn-p:hover:not(:disabled) { background: var(--ac2); }
    .btn-s { background: var(--bg2); color: var(--t1); border: 1px solid var(--bd); }
    .btn-s:hover:not(:disabled) { background: var(--bd); }
    .btn-d { background: var(--err); color: #fff; }
    .btn-d:hover:not(:disabled) { background: #9e2a2a; }
    .btn-w { width: 100%; }
    .btn-lg { font-size: 15px; min-height: 50px; }

    /* Input */
    .inp {
      width: 100%; background: var(--bg2); border: 1.5px solid var(--bd);
      border-radius: 10px; padding: 11px 14px;
      font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--t1);
      outline: none; min-height: 44px;
      transition: border-color var(--tr), box-shadow var(--tr);
    }
    .inp:focus { border-color: var(--ac); box-shadow: 0 0 0 3px rgba(194,101,26,0.1); }
    .inp::placeholder { color: var(--t3); }
    textarea.inp { resize: vertical; min-height: 80px; }

    /* Tag pill */
    .tag {
      background: var(--tag); color: var(--t2);
      border-radius: 20px; padding: 4px 11px;
      font-size: 12px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 5px;
      white-space: nowrap;
    }

    /* Card */
    .card {
      background: var(--card); border-radius: 14px;
      box-shadow: 0 2px 12px rgba(26,22,21,0.06), 0 1px 2px rgba(26,22,21,0.04);
      border: 1px solid rgba(227,220,212,0.6);
    }

    /* Lang badge */
    .lang {
      background: rgba(26,22,21,0.08); color: var(--t2);
      border-radius: 5px; padding: 2px 7px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Animations */
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-up { animation: fadeUp 280ms ease forwards; }
    .slide-up { animation: slideUp 320ms cubic-bezier(0.16,1,0.3,1) forwards; }
    .shimmer-bg {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bd) 50%, var(--bg2) 75%);
      background-size: 400px 100%;
      animation: shimmer 1.6s infinite;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    .spinner-d {
      border: 2px solid rgba(194,101,26,0.2);
      border-top-color: var(--ac);
    }

    /* Staggered fade for lists */
    .stagger > * { opacity: 0; animation: fadeUp 300ms ease forwards; }
    .stagger > *:nth-child(1)  { animation-delay: 0ms; }
    .stagger > *:nth-child(2)  { animation-delay: 50ms; }
    .stagger > *:nth-child(3)  { animation-delay: 100ms; }
    .stagger > *:nth-child(4)  { animation-delay: 150ms; }
    .stagger > *:nth-child(5)  { animation-delay: 200ms; }
    .stagger > *:nth-child(6)  { animation-delay: 250ms; }
    .stagger > *:nth-child(n+7) { animation-delay: 300ms; }

    /* Books grid — asymmetric masonry offset */
    .books-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
    .books-grid > *:nth-child(even) { margin-top: 22px; }

    /* Bottom nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; z-index: 40;
      background: rgba(247,244,239,0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.55);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 -1px 0 rgba(227,220,212,0.5);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(26,22,21,0.45);
      backdrop-filter: blur(3px);
      z-index: 50;
    }

    /* Modal sheet */
    .modal-sheet {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px; z-index: 51;
      background: var(--card);
      border-radius: 22px 22px 0 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      max-height: 90vh;
      display: flex; flex-direction: column;
    }

    /* Section labels */
    .section-label {
      font-size: 11px; font-weight: 700; color: var(--t3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 0 0 10px;
    }

    /* Highlight item — left accent line, no heavy card */
    .hl-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--bd);
    }
    .hl-item:last-child { border-bottom: none; }
    .hl-ltr { padding-left: 14px; border-left: 2.5px solid var(--ac); margin-left: -2px; }
    .hl-rtl { padding-right: 14px; border-right: 2.5px solid var(--ac); margin-right: -2px; direction: rtl; }

    /* Settings rows */
    .settings-card { background: var(--card); border-radius: 14px; border: 1px solid rgba(227,220,212,0.7); overflow: hidden; }
    .settings-row {
      padding: 14px 16px;
      border-bottom: 1px solid var(--bd);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .settings-row:last-child { border-bottom: none; }

    /* Progress bar */
    .progress-track { height: 5px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 3px; transition: width 600ms ease; }

    /* Segment control */
    .seg { display: flex; background: var(--bg2); border-radius: 9px; padding: 3px; border: 1px solid var(--bd); }
    .seg-btn {
      flex: 1; padding: 8px 12px; border: none; border-radius: 7px; cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
      background: transparent; color: var(--t2); transition: all var(--tr);
    }
    .seg-btn.active { background: var(--card); color: var(--ac); font-weight: 600; box-shadow: 0 1px 4px rgba(26,22,21,0.08); }

    /* Cover placeholder */
    .cover-ph {
      width: 100%; aspect-ratio: 2/3; background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, var(--bg2) 0%, var(--bd) 100%);
    }

    /* Photo queue */
    .photo-queue { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; }
    .photo-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 3/4; background: var(--bg2); }

    /* Upload drop zone */
    .drop-zone {
      border: 2px dashed var(--bd); border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 32px 20px; cursor: pointer;
      transition: border-color var(--tr), background var(--tr);
    }
    .drop-zone:hover { border-color: var(--ac); background: rgba(194,101,26,0.03); }

    /* Empty state */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 52px 24px; text-align: center; gap: 12px;
    }
    .empty-icon {
      width: 64px; height: 64px; border-radius: 20px;
      background: var(--bg2); display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }

    /* Back button */
    .back-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: none; cursor: pointer;
      color: var(--ac); font-family: 'Outfit', sans-serif;
      font-size: 14px; font-weight: 500; padding: 4px 0; min-height: 44px;
    }

    /* Safe area */
    .safe-top { padding-top: calc(16px + env(safe-area-inset-top, 0px)) !important; }
    .pb-nav { padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px)); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

/* ─── Storage ─── */
const SK = 'bookmarks_app';
const AK = 'bookmarks_api_key';
const DEF = { version:1, books:[], highlights:[], tags:[], settings:{ defaultLanguage:'en', sortOrder:'dateAdded' } };

function gs() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) { const d = {...DEF}; localStorage.setItem(SK, JSON.stringify(d)); return d; }
    const p = JSON.parse(raw);
    if (!p.books) p.books = [];
    if (!p.highlights) p.highlights = [];
    if (!p.tags) p.tags = [];
    if (!p.settings) p.settings = { ...DEF.settings };
    return p;
  } catch(e) { return {...DEF}; }
}
function ss(data) {
  try { localStorage.setItem(SK, JSON.stringify(data)); }
  catch(e) { if (e.name === 'QuotaExceededError') throw new Error('Storage full. Export and clear data.'); throw e; }
}
function addBook(b) { const s=gs(); s.books.push({...b,dateAdded:b.dateAdded||new Date().toISOString(),highlights:b.highlights||[],tags:b.tags||[]}); ss(s); return s.books[s.books.length-1]; }
function getBook(id) { return gs().books.find(b=>b.id===id)||null; }
function updateBook(id,upd) { const s=gs(); const i=s.books.findIndex(b=>b.id===id); if(i===-1)return null; s.books[i]={...s.books[i],...upd}; ss(s); return s.books[i]; }
function deleteBook(id) { const s=gs(); s.highlights=s.highlights.filter(h=>h.bookId!==id); s.books=s.books.filter(b=>b.id!==id); ss(s); }
function addHighlight(h) { const s=gs(); const nh={...h,dateAdded:h.dateAdded||new Date().toISOString(),isFavorite:h.isFavorite||false,tags:h.tags||[],isEdited:h.isEdited||false}; s.highlights.push(nh); const bi=s.books.findIndex(b=>b.id===h.bookId); if(bi!==-1){if(!s.books[bi].highlights)s.books[bi].highlights=[];s.books[bi].highlights.push(nh.id);} ss(s); return nh; }
function updateHighlight(id, upd) { const s=gs(); const i=s.highlights.findIndex(h=>h.id===id); if(i===-1)return null; s.highlights[i]={...s.highlights[i],...upd}; ss(s); return s.highlights[i]; }
function delHighlight(id) { const s=gs(); const h=s.highlights.find(x=>x.id===id); if(!h)return; s.highlights=s.highlights.filter(x=>x.id!==id); const bi=s.books.findIndex(b=>b.id===h.bookId); if(bi!==-1)s.books[bi].highlights=(s.books[bi].highlights||[]).filter(x=>x!==id); ss(s); }
function getHighlights(bookId) { const s=gs(); return bookId ? s.highlights.filter(h=>h.bookId===bookId) : s.highlights; }
function getAllTags() { return gs().tags||[]; }
function addTag(t) { const s=gs(); if(!s.tags)s.tags=[]; if(t&&!s.tags.includes(t)){s.tags.push(t);ss(s);} }
function renameTag(old,nw) { const s=gs(); s.tags=(s.tags||[]).map(t=>t===old?nw:t); s.books=s.books.map(b=>({...b,tags:(b.tags||[]).map(t=>t===old?nw:t)})); s.highlights=s.highlights.map(h=>({...h,tags:(h.tags||[]).map(t=>t===old?nw:t)})); ss(s); }
function deleteTag(t) { const s=gs(); s.tags=(s.tags||[]).filter(x=>x!==t); s.books=s.books.map(b=>({...b,tags:(b.tags||[]).filter(x=>x!==t)})); s.highlights=s.highlights.map(h=>({...h,tags:(h.tags||[]).filter(x=>x!==t)})); ss(s); }
function getSettings() { return gs().settings||DEF.settings; }
function updateSettings(u) { const s=gs(); s.settings={...s.settings,...u}; ss(s); return s.settings; }
function exportData() { return JSON.stringify(gs(),null,2); }
function importData(json) { try { const d=JSON.parse(json); if(!d.books||!d.highlights)throw new Error('Missing books or highlights'); if(!d.version)d.version=1; if(!d.tags)d.tags=[]; if(!d.settings)d.settings={...DEF.settings}; ss(d); } catch(e){throw new Error('Import failed: '+e.message);} }
function clearAllData() { ss({...DEF}); }
function getApiKey() { return localStorage.getItem(AK)||''; }
function saveApiKey(k) { k ? localStorage.setItem(AK,k.trim()) : localStorage.removeItem(AK); }
function getStorageSize() { try { return new Blob([localStorage.getItem(SK)||'']).size; } catch { return 0; } }

/* ─── Helpers ─── */
function genId() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }
function isHeb(t) { return t && /[\u0590-\u05FF]/.test(t); }
function getDir(t) { return isHeb(t)?'rtl':'ltr'; }
function truncate(s,n=36) { return s&&s.length>n?s.slice(0,n).trim()+'…':s||''; }
function fmtDate(iso) {
  if(!iso)return '';
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/(86400000));
  if(diff===0){const h=Math.floor((now-d)/3600000);if(h===0){const m=Math.floor((now-d)/60000);return m<2?'just now':`${m}m ago`;}return h===1?'1h ago':`${h}h ago`;}
  if(diff===1)return 'yesterday';if(diff<7)return `${diff}d ago`;if(diff<30)return `${Math.floor(diff/7)}w ago`;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtBytes(b) { if(b<1024)return b+' B'; if(b<1048576)return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(2)+' MB'; }
function sortBooks(books,order) {
  const s=[...books];
  if(order==='title')return s.sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  if(order==='author')return s.sort((a,b)=>(a.author||'').localeCompare(b.author||''));
  return s.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
}
function fileToB64(f) { return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=()=>rej(new Error('Failed to read file'));r.readAsDataURL(f);}); }
function compressImg(b64,maxW=800,q=0.75) {
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',q));
    };
    img.onerror=()=>rej(new Error('Failed to compress image'));
    img.src=b64;
  });
}

/* ─── Gemini ─── */
const GM_MODELS=['gemini-2.5-flash','gemini-2.0-flash','gemini-2.0-flash-lite'];
const GM_API='v1beta';
function gemUrl(model,k){return `https://generativelanguage.googleapis.com/${GM_API}/models/${model}:generateContent?key=${k}`;}
console.log('[MyBooksApp] Gemini model sequence:', GM_MODELS.join(' → '), '| endpoint:', GM_API);

/* Helper: list all models that support generateContent for the stored API key.
   Call listAvailableModels() from the browser console to debug model-not-found errors. */
async function listAvailableModels(){
  const k=getApiKey();
  if(!k){console.warn('[MyBooksApp] No API key stored — set it in Settings first.');return;}
  const res=await fetch(`https://generativelanguage.googleapis.com/${GM_API}/models?key=${k}`);
  if(!res.ok){console.error('[MyBooksApp] listModels HTTP',res.status);return;}
  const data=await res.json();
  const supported=(data.models||[])
    .filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent'))
    .map(m=>m.name);
  console.log('[MyBooksApp] Models supporting generateContent:\n'+supported.join('\n'));
  return supported;
}
function buildPrompt(lang){
  const he=lang==='he';
  return `You are analyzing a photograph of a book page from a ${he?'Hebrew (right-to-left)':'printed'} book.

The reader has marked passages using a PENCIL. The pencil mark is a thin vertical line or small bracket drawn in the WHITE MARGIN SPACE to the RIGHT of the printed text block. The mark runs alongside 1–5 lines of text to indicate which lines are the selected quote.

${he?`HEBREW BOOK SPECIFICS:
- Hebrew text reads RIGHT TO LEFT, so the right edge of the text block is where each line STARTS.
- The pencil mark appears in the narrow white margin to the RIGHT of the text column — between the text and the right edge of the page.
- The mark may be very faint (light gray pencil), a short vertical stroke or a small bracket [ shape.`:`ENGLISH BOOK SPECIFICS:
- Look for faint pencil lines in the right margin beside lines of text.`}

CRITICAL RULES:
- ONLY look for marks in the RIGHT margin (white space to the right of the text block).
- The mark will be a thin vertical pencil stroke or bracket — possibly very faint.
- Do NOT look for underlines beneath words.
- Do NOT look for highlights or colored marks.
- Do NOT look for marks on the LEFT side of the text.
- Only count marks you are confident about. Do NOT guess or hallucinate marks.

YOUR TASK:
1. Scan the RIGHT margin of the page carefully for any pencil marks.
2. For each pencil mark found, identify which lines of text it sits beside.
3. Extract those lines as the marked passage.

Return ONLY valid JSON:
{
  "highlights": [
    { "markedText": "exact text beside the pencil mark", "fullContext": "all the text on the page that is NOT beside the pencil mark — the sentences before and after the marked passage", "pageNumber": null }
  ]
}
If no right-margin pencil marks are visible: {"highlights":[]}`;
}

/* ─── SVG Icons ─── */
const IC = {
  back: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>,
  next: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>,
  plus: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  x: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  check: <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
  search: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  book: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
  bookmark: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>,

  play: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
  down: <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
  photo: <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
  eye: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,

  import: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  edit: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,

/* ─── Spinner ─── */
function Spin({dark}) { return <div className={`spinner${dark?'':''}`} style={dark?{borderColor:'rgba(194,101,26,0.2)',borderTopColor:'var(--ac)'}:{}}/>; }

/* ─── TagPill ─── */
function TagPill({tag, onRemove, active, onClick}) {
  return (
    <span
      className="tag"
      onClick={onClick}
      style={{
        cursor:onClick?'pointer':'default',
        background: active ? 'var(--ac)' : 'var(--tag)',
        color: active ? '#fff' : 'var(--t2)',
        transition: 'all var(--tr)',
      }}
    >
      {tag}
      {onRemove && (
        <button onClick={e=>{e.stopPropagation();onRemove();}} style={{background:'none',border:'none',padding:'0 0 0 2px',cursor:'pointer',color:'inherit',display:'flex',alignItems:'center',lineHeight:1}}>
          {IC.x}
        </button>
      )}
    </span>
  );
}

/* ─── ConfirmModal ─── */
function ConfirmModal({isOpen, onClose, onConfirm, title, message, confirmLabel='Confirm', danger=false}) {
  useEffect(()=>{
    if(isOpen)document.body.style.overflow='hidden';
    else document.body.style.overflow='';
    return ()=>{document.body.style.overflow='';};
  },[isOpen]);
  if(!isOpen)return null;
  return (
    <>
      <div className="overlay" onClick={onClose}/>
      <div className="modal-sheet slide-up">
        <div style={{width:36,height:4,background:'var(--bd)',borderRadius:2,margin:'14px auto 0'}}/>
        <div style={{padding:'18px 20px 14px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <h2 style={{margin:0,fontSize:17,fontWeight:600,color:'var(--t1)'}}>{title}</h2>
          <button onClick={onClose} style={{background:'var(--bg2)',border:'none',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--t2)'}}>
            {IC.x}
          </button>
        </div>
        <div style={{padding:'20px',flex:1,overflowY:'auto'}}>
          <p style={{margin:0,fontSize:14,color:'var(--t2)',lineHeight:1.6}}>{message}</p>
        </div>
        <div style={{padding:'16px 20px',borderTop:'1px solid var(--bd)',display:'flex',gap:10}}>
          <button className="btn btn-s" style={{flex:1}} onClick={onClose}>Cancel</button>
          <button className={`btn ${danger?'btn-d':'btn-p'}`} style={{flex:1}} onClick={()=>{onConfirm();onClose();}}>{confirmLabel}</button>
        </div>
      </div>
    </>
  );
}

/* ─── EmptyState ─── */
function EmptyState({icon, title, description, action}) {
  return (
    <div className="empty fade-up">
      <div className="empty-icon">{icon||IC.book}</div>
      <div>
        <p style={{margin:'0 0 6px',fontSize:16,fontWeight:600,color:'var(--t1)'}}>{title}</p>
        {description&&<p style={{margin:0,fontSize:13,color:'var(--t2)',lineHeight:1.6,maxWidth:'28ch',margin:'0 auto'}}>{description}</p>}
      </div>
      {action&&<div style={{marginTop:4}}>{action}</div>}
    </div>
  );
}

/* ─── BookCard ─── */
function BookCard({book, highlightCount, onClick}) {
  const [hov,setHov]=useState(false);
  return (
    <button
      onClick={onClick}
      onMouseEnter={()=>setHov(true)}
      onMouseLeave={()=>setHov(false)}
      style={{
        border:'none',background:'none',padding:0,cursor:'pointer',textAlign:'left',width:'100%',
        transform:hov?'translateY(-3px)':'translateY(0)',
        transition:'transform var(--tr)',
      }}
    >
      <div className="card" style={{overflow:'hidden',boxShadow:hov?'0 8px 24px rgba(26,22,21,0.12)':'0 2px 12px rgba(26,22,21,0.06)',transition:'box-shadow var(--tr)',borderLeft:`2px solid ${hov?'var(--ac)':'transparent'}`,}}>
        {/* Cover */}
        <div style={{width:'100%',aspectRatio:'2/3',overflow:'hidden',position:'relative',background:'var(--bg2)'}}>
          {book.coverPhoto
            ? <img src={book.coverPhoto} alt={book.title} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
            : <div className="cover-ph"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--t3)" strokeWidth="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></div>
          }
          {book.language&&<span className="lang" style={{position:'absolute',top:8,right:8}}>{book.language.toUpperCase()}</span>}
        </div>
        {/* Info */}
        <div style={{padding:'10px 12px 13px'}}>
          <p style={{margin:'0 0 2px',fontSize:12,fontWeight:600,color:'var(--t1)',lineHeight:1.35}}>{truncate(book.title,32)}</p>
          <p style={{margin:'0 0 7px',fontSize:11,color:'var(--t2)'}}>{truncate(book.author,26)}</p>
          <div style={{display:'flex',alignItems:'center',gap:4,color:'var(--t3)'}}>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span style={{fontSize:10,fontWeight:500}}>{highlightCount||0} {(highlightCount||0)===1?'highlight':'highlights'}</span>
          </div>
        </div>
      </div>
    </button>
  );
}

/* ─── HighlightCard ─── */
function HighlightCard({highlight, bookTitle, showBookTitle, onFavoriteToggle, onDelete, onEdit, onTagAdd, onTagRemove, allTags=[], navigate}) {
  const [showCtx,setShowCtx]=useState(false);
  const [showTagInp,setShowTagInp]=useState(false);
  const [tagInp,setTagInp]=useState('');
  const [isEditing,setIsEditing]=useState(false);
  const [showDelConfirm,setShowDelConfirm]=useState(false);
  const [draft,setDraft]=useState({markedText:highlight.markedText||'',fullContext:highlight.fullContext||'',pageNumber:highlight.pageNumber||''});
  const dir=getDir(highlight.markedText);
  const rtl=dir==='rtl';

  const doAddTag=()=>{
    const t=tagInp.trim();
    if(t&&onTagAdd){onTagAdd(highlight.id,t);setTagInp('');setShowTagInp(false);}
  };

  const doSaveEdit=()=>{
    if(!draft.markedText.trim())return;
    if(onEdit)onEdit(highlight.id,{markedText:draft.markedText.trim(),fullContext:draft.fullContext.trim(),pageNumber:draft.pageNumber?Number(draft.pageNumber):null,isEdited:true});
    setIsEditing(false);
  };

  const doCancelEdit=()=>{
    setDraft({markedText:highlight.markedText||'',fullContext:highlight.fullContext||'',pageNumber:highlight.pageNumber||''});
    setIsEditing(false);
  };

  return (
    <>
      <div className={`hl-item ${rtl?'hl-rtl':'hl-ltr'} fade-up`}>
        {/* Book title link */}
        {showBookTitle&&bookTitle&&(
          <button onClick={()=>navigate&&navigate('book-detail',{bookId:highlight.bookId})}
            style={{background:'none',border:'none',padding:'0 0 5px',cursor:'pointer',fontSize:11,fontWeight:600,color:'var(--ac)',display:'block',textAlign:rtl?'right':'left'}}>
            {bookTitle}
          </button>
        )}
        {!isEditing&&highlight.pageNumber&&<span style={{display:'block',fontSize:11,color:'var(--t3)',marginBottom:4,textAlign:rtl?'right':'left'}}>p.{highlight.pageNumber}</span>}

        {/* Header row — favorite star */}
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8,flexDirection:rtl?'row-reverse':'row',marginBottom:8}}>
          <div style={{position:'relative',flex:1}}>
            {!isEditing&&<span style={{position:'absolute',top:-14,right:rtl?0:'auto',left:rtl?'auto':0,fontSize:52,lineHeight:1,color:'var(--ac)',opacity:0.15,fontFamily:"'Noto Serif Hebrew',serif",pointerEvents:'none',userSelect:'none'}}>"</span>}
            {isEditing ? (
              <div>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4,textAlign:rtl?'right':'left'}}>Quote</label>
                <textarea value={draft.markedText} onChange={e=>setDraft(d=>({...d,markedText:e.target.value}))} rows={4} dir={dir}
                  style={{width:'100%',fontFamily:rtl?"'Noto Serif Hebrew',serif":'inherit',fontSize:15,lineHeight:1.7,color:'var(--t1)',background:'var(--bg2)',border:'1.5px solid var(--ac)',borderRadius:8,padding:'10px 12px',resize:'vertical',outline:'none',boxSizing:'border-box',direction:dir,marginBottom:10}}/>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4,textAlign:rtl?'right':'left'}}>Context (optional)</label>
                <textarea value={draft.fullContext} onChange={e=>setDraft(d=>({...d,fullContext:e.target.value}))} rows={3} dir={dir}
                  style={{width:'100%',fontSize:13,lineHeight:1.65,color:'var(--t2)',background:'var(--bg2)',border:'1.5px solid var(--bd)',borderRadius:8,padding:'10px 12px',resize:'vertical',outline:'none',boxSizing:'border-box',direction:dir,marginBottom:10}}/>
                <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>Page number (optional)</label>
                <input type="number" value={draft.pageNumber} onChange={e=>setDraft(d=>({...d,pageNumber:e.target.value}))} placeholder="e.g. 42"
                  style={{width:110,fontSize:14,color:'var(--t1)',background:'var(--bg2)',border:'1.5px solid var(--bd)',borderRadius:8,padding:'8px 12px',outline:'none',boxSizing:'border-box',marginBottom:12}}/>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={doSaveEdit} style={{flex:1,background:'var(--ac)',color:'white',border:'none',borderRadius:8,padding:'10px 16px',fontSize:14,fontWeight:600,cursor:'pointer'}}>Save</button>
                  <button onClick={doCancelEdit} style={{flex:1,background:'var(--bg2)',color:'var(--t2)',border:'1px solid var(--bd)',borderRadius:8,padding:'10px 16px',fontSize:14,cursor:'pointer'}}>Cancel</button>
                </div>
              </div>
            ) : (
              <p style={{margin:0,fontSize:16,fontWeight:500,color:'var(--t1)',lineHeight:1.75,textAlign:rtl?'right':'left',direction:dir,fontFamily:rtl?"'Noto Serif Hebrew',serif":undefined,paddingTop:4}}>
                {highlight.markedText}
              </p>
            )}
          </div>
          <button
            onClick={()=>onFavoriteToggle&&onFavoriteToggle(highlight.id,!highlight.isFavorite)}
            style={{background:'none',border:'none',padding:'3px',cursor:'pointer',color:highlight.isFavorite?'var(--gold)':'var(--t3)',flexShrink:0,display:'flex',alignItems:'center',borderRadius:6}}
          >
            {IC.star(highlight.isFavorite)}
          </button>
        </div>

        {/* Context toggle — hidden in edit mode */}
        {!isEditing&&highlight.fullContext&&highlight.fullContext!==highlight.markedText&&(
          <div style={{marginBottom:8}}>
            <button onClick={()=>setShowCtx(v=>!v)}
              style={{background:'none',border:'none',padding:0,cursor:'pointer',fontSize:12,color:'var(--t2)',display:'flex',alignItems:'center',gap:4,flexDirection:rtl?'row-reverse':'row'}}>
              <span style={{transform:showCtx?'rotate(180deg)':'none',transition:'transform 0.2s',display:'inline-block'}}>{IC.down}</span>
              {showCtx?'Hide context':'Show context'}
            </button>
            {showCtx&&<p style={{margin:'8px 0 0',fontSize:12,color:'var(--t2)',lineHeight:1.65,padding:'10px 12px',background:'var(--bg2)',borderRadius:8,direction:dir,textAlign:rtl?'right':'left'}}>{highlight.fullContext}</p>}
          </div>
        )}

        {/* Tags */}
        <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center',marginBottom:8,flexDirection:rtl?'row-reverse':'row'}}>
          {(highlight.tags||[]).map(t=><TagPill key={t} tag={t} onRemove={onTagRemove?()=>onTagRemove(highlight.id,t):undefined}/>)}
          {onTagAdd&&(showTagInp
            ? <div style={{display:'flex',alignItems:'center',gap:4}}>
                <input value={tagInp} onChange={e=>setTagInp(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')doAddTag();if(e.key==='Escape'){setShowTagInp(false);setTagInp('');}}}
                  onBlur={()=>{if(!tagInp.trim())setShowTagInp(false);}}
                  placeholder="tag" autoFocus list="tag-opts"
                  style={{border:'1.5px solid var(--ac)',borderRadius:20,padding:'3px 10px',fontSize:12,fontFamily:'Outfit,sans-serif',color:'var(--t1)',background:'var(--card)',outline:'none',width:90}}/>
                <datalist id="tag-opts">{allTags.map(t=><option key={t} value={t}/>)}</datalist>
                <button onClick={doAddTag} style={{background:'var(--ac)',border:'none',borderRadius:'50%',width:22,height:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'white',padding:0}}>{IC.check}</button>
              </div>
            : <button onClick={()=>setShowTagInp(true)} className="tag" style={{background:'none',border:'1px dashed var(--bd)',cursor:'pointer',color:'var(--t3)'}}>
                {IC.plus} tag
              </button>
          )}
        </div>

        {/* Footer — always LTR so buttons stay predictable */}
        {!isEditing&&(
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',direction:'ltr'}}>
            <span style={{fontSize:11,color:'var(--t3)'}}>{fmtDate(highlight.dateAdded)}{highlight.isEdited&&' · edited'}</span>
            <div style={{display:'flex',gap:2}}>
              {onEdit&&<button onClick={()=>setIsEditing(true)}
                style={{background:'none',border:'none',padding:'3px 7px',cursor:'pointer',fontSize:11,color:'var(--t3)',display:'flex',alignItems:'center',gap:3,borderRadius:6}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--ac)'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Edit
              </button>}
              {onDelete&&<button onClick={()=>setShowDelConfirm(true)}
                style={{background:'none',border:'none',padding:'3px 7px',cursor:'pointer',fontSize:11,color:'var(--t3)',display:'flex',alignItems:'center',gap:3,borderRadius:6}}
                onMouseEnter={e=>e.currentTarget.style.color='var(--err)'}
                onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
                {IC.trash} Delete
              </button>}
            </div>
          </div>
        )}
      </div>

      {/* ConfirmModal is OUTSIDE the fade-up div to avoid CSS transform stacking-context trap */}
      <ConfirmModal
        isOpen={showDelConfirm}
        onClose={()=>setShowDelConfirm(false)}
        onConfirm={()=>onDelete&&onDelete(highlight.id)}
        title="Delete Highlight"
        message="Delete this highlight? This cannot be undone."
        confirmLabel="Delete"
        danger
      />
    </>
  );
}

/* ─── BottomNav ─── */
function BottomNav({activeTab, navigate}) {
  const tabs=[
    {id:'library',label:'Library',icon:(a)=><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>},
    {id:'highlights',label:'Highlights',icon:(a)=><svg width="21" height="21" viewBox="0 0 24 24" fill={a?'currentColor':'none'} stroke="currentColor" strokeWidth={a?2:1.8} strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>},
    {id:'settings',label:'Settings',icon:(a)=><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={a?2.2:1.8} strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},
  ];
  return (
    <nav className="bottom-nav">
      <div style={{display:'flex',height:64}}>
        {tabs.map(tab=>{
          const a=activeTab===tab.id;
          return (
            <button key={tab.id} onClick={()=>navigate(tab.id)}
              style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,border:'none',background:'none',cursor:'pointer',color:a?'var(--ac)':'var(--t3)',transition:'color var(--tr)',padding:'6px 0'}}>
              <div style={{transform:a?'scale(1.05)':'scale(1)',transition:'transform var(--tr)'}}>{tab.icon(a)}</div>

}

/* ─── LibraryPage ─── */

/* ─── AllHighlightsPage ─── */
function AllHighlightsPage({navigate}) {
  const [highlights,setHighlights]=useState([]);
  const [books,setBooks]=useState([]);
  const [allTags,setAllTags]=useState([]);
  const [q,setQ]=useState('');
  const [favOnly,setFavOnly]=useState(false);
  const [filterTag,setFilterTag]=useState(null);
  const [filterBook,setFilterBook]=useState(null);
  const [showFilters,setShowFilters]=useState(false);

  const load=useCallback(()=>{const s=gs();setHighlights(s.highlights||[]);setBooks(s.books||[]);setAllTags(getAllTags());},[]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{const h=()=>{if(!document.hidden)load();};document.addEventListener('visibilitychange',h);return()=>document.removeEventListener('visibilitychange',h);},[load]);

  const bookTitle=(id)=>books.find(b=>b.id===id)?.title||'Unknown';

  const filtered=([...highlights].sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded))).filter(h=>{
    if(favOnly&&!h.isFavorite)return false;
    if(filterTag&&!(h.tags||[]).includes(filterTag))return false;
    if(filterBook&&h.bookId!==filterBook)return false;
    if(q.trim()){const lo=q.toLowerCase();return h.markedText?.toLowerCase().includes(lo)||(h.tags||[]).some(t=>t.toLowerCase().includes(lo))||bookTitle(h.bookId).toLowerCase().includes(lo);}
    return true;
  });

  const activeFilters=[favOnly,filterTag,filterBook].filter(Boolean).length;

  const doFavTog=(id,v)=>{updateHighlight(id,{isFavorite:v});setHighlights(p=>p.map(h=>h.id===id?{...h,isFavorite:v}:h));};
  const doDel=(id)=>{delHighlight(id);setHighlights(p=>p.filter(h=>h.id!==id));};
  const doEdit=(id,upd)=>{updateHighlight(id,upd);setHighlights(p=>p.map(h=>h.id===id?{...h,...upd}:h));};
  const doTagAdd=(hid,t)=>{const h=highlights.find(x=>x.id===hid);if(!h)return;const nt=[...new Set([...(h.tags||[]),t])];updateHighlight(hid,{tags:nt});setHighlights(p=>p.map(x=>x.id===hid?{...x,tags:nt}:x));addTag(t);setAllTags(getAllTags());};
  const doTagRm=(hid,t)=>{const h=highlights.find(x=>x.id===hid);if(!h)return;const nt=(h.tags||[]).filter(x=>x!==t);updateHighlight(hid,{tags:nt});setHighlights(p=>p.map(x=>x.id===hid?{...x,tags:nt}:x));};

  return (
    <div style={{minHeight:'100dvh',background:'var(--bg)'}}>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',paddingTop:'calc(18px + env(safe-area-inset-top,0px))'}}>
        <div style={{padding:'0 20px 14px'}}>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:14}}>
            <div>
              <h1 style={{margin:0,fontSize:28,fontWeight:700,color:'var(--t1)',letterSpacing:'-0.03em',lineHeight:1.1}}>Highlights</h1>
              <p style={{margin:'3px 0 0',fontSize:12,color:'var(--t3)'}}>{filtered.length} of {highlights.length}</p>
            </div>
            <button
              onClick={()=>setShowFilters(v=>!v)}
              style={{background:activeFilters>0?'var(--ac)':'var(--bg2)',border:`1px solid ${activeFilters>0?'var(--ac)':'var(--bd)'}`,borderRadius:10,padding:'0 14px',height:40,fontSize:13,fontFamily:'Outfit,sans-serif',fontWeight:500,cursor:'pointer',display:'flex',alignItems:'center',gap:6,color:activeFilters>0?'#fff':'var(--t2)',transition:'all var(--tr)'}}
            >
              {IC.filter} Filter
              {activeFilters>0&&<span style={{background:'white',color:'var(--ac)',borderRadius:'50%',width:18,height:18,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700}}>{activeFilters}</span>}
            </button>
          </div>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--t3)',pointerEvents:'none',display:'flex'}}>{IC.search}</span>
            <input type="search" className="inp" placeholder="Search highlights…" value={q} onChange={e=>setQ(e.target.value)} style={{paddingLeft:36,height:40}}/>
          </div>

          {showFilters&&(
            <div className="card fade-up" style={{marginTop:12,padding:'16px',borderRadius:12}}>
              {/* Favorites */}
              <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',marginBottom:14}}>
                <div onClick={()=>setFavOnly(v=>!v)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${favOnly?'var(--gold)':'var(--bd)'}`,background:favOnly?'var(--gold)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all var(--tr)'}}>
                  {favOnly&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
                </div>
                <span style={{fontSize:13,color:'var(--t1)',display:'flex',alignItems:'center',gap:5}}>{IC.star(true)} Favorites only</span>
              </label>
              {allTags.length>0&&(
                <div style={{marginBottom:14}}>
                  <p className="section-label" style={{margin:'0 0 8px'}}>By Tag</p>
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {allTags.map(t=><TagPill key={t} tag={t} active={filterTag===t} onClick={()=>setFilterTag(filterTag===t?null:t)}/>)}
                  </div>
                </div>
              )}
              {books.length>0&&(
                <div>
                  <p className="section-label" style={{margin:'0 0 8px'}}>By Book</p>
                  <select className="inp" value={filterBook||''} onChange={e=>setFilterBook(e.target.value||null)} style={{fontSize:13,height:40}}>
                    <option value="">All books</option>
                    {books.map(b=><option key={b.id} value={b.id}>{b.title}</option>)}
                  </select>
                </div>
              )}
              {activeFilters>0&&<button onClick={()=>{setFavOnly(false);setFilterTag(null);setFilterBook(null);}} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--err)',padding:'10px 0 0',display:'block'}}>Clear all filters</button>}
            </div>
          )}
        </div>
        <div style={{height:1,background:'var(--bd)'}}/>
      </div>

      <div style={{padding:'4px 20px 20px'}} className="pb-nav">
        {highlights.length===0
          ? <EmptyState icon={IC.bookmark} title="No highlights yet" description="Add books and photograph marked pages to start collecting." action={<button className="btn btn-p" onClick={()=>navigate('library')}>Go to Library</button>}/>
          : filtered.length===0
            ? <EmptyState icon={IC.search} title="No matches" description="Try adjusting your search or filters." action={<button className="btn btn-s" onClick={()=>{setQ('');setFavOnly(false);setFilterTag(null);setFilterBook(null);}}>Clear</button>}/>
            : filtered.map(h=><HighlightCard key={h.id} highlight={h} bookTitle={bookTitle(h.bookId)} showBookTitle allTags={allTags} navigate={navigate} onFavoriteToggle={doFavTog} onDelete={doDel} onEdit={doEdit} onTagAdd={doTagAdd} onTagRemove={doTagRm}/>)
        }
      </div>
    </div>
  );
}

/* ─── BookDetailPage ─── */
function BookDetailPage({navigate, bookId}) {
  const [book,setBook]=useState(null);
  const [highlights,setHighlights]=useState([]);
  const [allTags,setAllTags]=useState([]);
  const [showDel,setShowDel]=useState(false);
  const [showAddManual,setShowAddManual]=useState(false);
  const [manualDraft,setManualDraft]=useState({markedText:'',fullContext:'',pageNumber:''});

  const coverInputRef=useRef(null);

  const handleCoverChange=async(e)=>{
    const f=e.target.files?.[0]; if(!f)return;
    try{
      const b=await fileToB64(f);
      const compressed=await compressImg(b,600,0.8);
      const updated=updateBook(bookId,{coverPhoto:compressed});
      setBook(updated);
    }catch(err){console.error('Cover update failed',err);}
    e.target.value='';
  };

  const load=useCallback(()=>{const b=getBook(bookId);if(!b){navigate('library');return;}setBook(b);setHighlights(getHighlights(bookId));setAllTags(getAllTags());},[bookId,navigate]);
  useEffect(()=>{load();},[load]);

  if(!book)return null;

  const favCount=highlights.filter(h=>h.isFavorite).length;
  const filtered=highlights.filter(h=>{if(!q.trim())return true;const lo=q.toLowerCase();return h.markedText?.toLowerCase().includes(lo)||(h.tags||[]).some(t=>t.toLowerCase().includes(lo));}).sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));

  const doFavTog=(id,v)=>{updateHighlight(id,{isFavorite:v});setHighlights(p=>p.map(h=>h.id===id?{...h,isFavorite:v}:h));};
  const doDel=(id)=>{delHighlight(id);setHighlights(p=>p.filter(h=>h.id!==id));};
  const doEdit=(id,upd)=>{updateHighlight(id,upd);setHighlights(p=>p.map(h=>h.id===id?{...h,...upd}:h));};
  const doTagAdd=(hid,t)=>{const h=highlights.find(x=>x.id===hid);if(!h)return;const nt=[...new Set([...(h.tags||[]),t])];updateHighlight(hid,{tags:nt});setHighlights(p=>p.map(x=>x.id===hid?{...x,tags:nt}:x));addTag(t);setAllTags(getAllTags());};
  const doTagRm=(hid,t)=>{const h=highlights.find(x=>x.id===hid);if(!h)return;const nt=(h.tags||[]).filter(x=>x!==t);updateHighlight(hid,{tags:nt});setHighlights(p=>p.map(x=>x.id===hid?{...x,tags:nt}:x));};
  const doAddManual=()=>{
    if(!manualDraft.markedText.trim())return;
    const nh=addHighlight({id:'h_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),bookId,markedText:manualDraft.markedText.trim(),fullContext:manualDraft.fullContext.trim()||'',pageNumber:manualDraft.pageNumber?Number(manualDraft.pageNumber):null,isFavorite:false,tags:[],isEdited:false});
    setHighlights(p=>[nh,...p]);
    setManualDraft({markedText:'',fullContext:'',pageNumber:''});
    setShowAddManual(false);

        <button className="back-btn" onClick={()=>navigate('library')}>{IC.back} Library</button>
        <button onClick={()=>setShowDel(true)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:8,display:'flex',alignItems:'center',borderRadius:8}} onMouseEnter={e=>e.currentTarget.style.color='var(--err)'} onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>{IC.trash}</button>
      </div>

      {/* Book hero — split layout */}
      <div style={{display:'flex',gap:18,padding:'22px 20px 18px',background:'var(--card)',borderBottom:'1px solid var(--bd)'}}>

          {/* Camera overlay */}
          <div style={{position:'absolute',inset:0,background:'rgba(26,22,21,0.45)',display:'flex',alignItems:'center',justifyContent:'center',opacity:0,transition:'opacity 0.2s'}}

          <h1 style={{margin:'0 0 4px',fontSize:19,fontWeight:700,color:'var(--t1)',lineHeight:1.25,letterSpacing:'-0.02em'}}>{book.title}</h1>
          <p style={{margin:'0 0 10px',fontSize:13,color:'var(--t2)'}}>{book.author}</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

        <div style={{padding:'14px 20px 0',position:'relative'}}>

            </div>
