        </>
      )}
    </div>
  );
}

/* ─── AddBookPage ─── */
function AddBookPage({navigate}) {
  const [title,setTitle]=useState('');
  const [author,setAuthor]=useState('');
  const [lang,setLang]=useState(()=>getSettings().defaultLanguage||'en');
  const [cover,setCover]=useState(null);
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);

  const handleCover=async(e)=>{
    const f=e.target.files?.[0]; if(!f)return;
    try{const b=await fileToB64(f);const c=await compressImg(b,600,0.8);setCover(c);setErrs(p=>({...p,cover:null}));}
    catch(e){setErrs(p=>({...p,cover:'Failed to process image'}));}
  };

  const validate=()=>{const e={};if(!title.trim())e.title='Title is required';if(!author.trim())e.author='Author is required';if(!cover)e.cover='Cover photo is required';setErrs(e);return!Object.keys(e).length;};

  const submit=async(e)=>{
    e.preventDefault();if(!validate())return;
    setSaving(true);
    try{const b=addBook({id:genId(),title:title.trim(),author:author.trim(),coverPhoto:cover,language:lang,tags:[],highlights:[],dateAdded:new Date().toISOString()});navigate('book-detail',{bookId:b.id});}
    catch(err){setErrs({submit:err.message});}
    finally{setSaving(false);}
  };

  return (
    <div style={{minHeight:'100dvh',background:'var(--bg)'}}>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',borderBottom:'1px solid var(--bd)',padding:'calc(14px + env(safe-area-inset-top,0px)) 20px 14px',display:'flex',alignItems:'center',gap:12}}>
        <button className="back-btn" onClick={()=>navigate('library')}>{IC.back} Cancel</button>
        <h1 style={{flex:1,margin:0,fontSize:16,fontWeight:600,color:'var(--t1)',textAlign:'center',letterSpacing:'-0.01em'}}>New Book</h1>
        <div style={{width:70}}/>
      </div>

      <form onSubmit={submit} style={{padding:'24px 20px'}} className="pb-nav">
        {/* Cover */}
        <div style={{marginBottom:22}}>
          <p className="section-label">Cover Photo <span style={{color:'var(--err)'}}>*</span></p>
          <label htmlFor="cover-in" className="drop-zone" style={{flexDirection:cover?'row':'column',padding:cover?14:32,justifyContent:cover?'flex-start':'center',borderColor:errs.cover?'var(--err)':undefined}}>
            {cover ? (
              <>
                <div style={{width:64,height:92,borderRadius:6,overflow:'hidden',flexShrink:0,boxShadow:'0 3px 12px rgba(26,22,21,0.15)'}}>
                  <img src={cover} alt="Cover" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                </div>
                <div style={{marginLeft:14}}>
                  <p style={{margin:'0 0 3px',fontSize:14,fontWeight:500,color:'var(--ac)'}}>Change cover</p>
                  <p style={{margin:0,fontSize:12,color:'var(--t3)'}}>Tap to select a different image</p>
                </div>
              </>
            ) : (
              <>
                <div style={{width:48,height:48,borderRadius:'50%',background:'var(--bg2)',display:'flex',alignItems:'center',justifyContent:'center'}}>{IC.photo}</div>
                <div style={{textAlign:'center'}}>
                  <p style={{margin:'0 0 2px',fontSize:14,fontWeight:500,color:'var(--ac)'}}>Upload cover photo</p>
                  <p style={{margin:0,fontSize:12,color:'var(--t3)'}}>JPEG, PNG, WebP</p>
                </div>
              </>
            )}
          </label>
          <input id="cover-in" type="file" accept="image/*" onChange={handleCover} style={{display:'none'}}/>
          {errs.cover&&<p style={{margin:'6px 0 0',fontSize:12,color:'var(--err)'}}>{errs.cover}</p>}
        </div>

        {/* Title */}
        <div style={{marginBottom:18}}>
          <label htmlFor="ttl" className="section-label" style={{display:'block',marginBottom:7}}>Title <span style={{color:'var(--err)'}}>*</span></label>
          <input id="ttl" type="text" className="inp" placeholder="Book title" value={title} onChange={e=>{setTitle(e.target.value);setErrs(p=>({...p,title:null}));}} style={{borderColor:errs.title?'var(--err)':undefined}}/>
          {errs.title&&<p style={{margin:'6px 0 0',fontSize:12,color:'var(--err)'}}>{errs.title}</p>}
        </div>

        {/* Author */}
        <div style={{marginBottom:18}}>
          <label htmlFor="aut" className="section-label" style={{display:'block',marginBottom:7}}>Author <span style={{color:'var(--err)'}}>*</span></label>
          <input id="aut" type="text" className="inp" placeholder="Author name" value={author} onChange={e=>{setAuthor(e.target.value);setErrs(p=>({...p,author:null}));}} style={{borderColor:errs.author?'var(--err)':undefined}}/>
          {errs.author&&<p style={{margin:'6px 0 0',fontSize:12,color:'var(--err)'}}>{errs.author}</p>}
        </div>

        {/* Language */}
        <div style={{marginBottom:28}}>
          <p className="section-label" style={{marginBottom:8}}>Language</p>
          <div className="seg">
            {[{v:'en',l:'English'},{v:'he',l:'Hebrew'}].map(o=>(
              <button key={o.v} type="button" className={`seg-btn${lang===o.v?' active':''}`} onClick={()=>setLang(o.v)}>{o.l}</button>
            ))}
          </div>
        </div>

        {errs.submit&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--err)'}}>{errs.submit}</div>}

        <button type="submit" className="btn btn-p btn-w btn-lg" disabled={saving}>
          {saving?<><Spin/> Adding Book…</>:'Add Book to Library'}
        </button>
      </form>
    </div>
  );
}

/* ─── AddHighlightsPage ─── */
function AddHighlightsPage({navigate, bookId}) {
  const [photos,setPhotos]=useState([]);
  const [processing,setProcessing]=useState(false);
  const book=getBook(bookId);
  if(!book){navigate('library');return null;}

  const handleFiles=async(files)=>{
    const arr=Array.from(files);
    const nph=await Promise.all(arr.map(async f=>{const b=await fileToB64(f);return{id:genId(),file:f,preview:b,status:'pending',result:null,error:null};}));
    setPhotos(p=>[...p,...nph]);
  };

  const analyze=async(photo)=>{
    const k=getApiKey();
    if(!k||!k.trim())throw new Error('No API key set. Add your Gemini key in Settings.');
    const lang=book.language||'en';
    const c=await compressImg(photo.preview,1200,0.85);
    const b64=c.replace(/^data:image\/[a-z]+;base64,/,'');
    const body={contents:[{parts:[{inline_data:{mime_type:'image/jpeg',data:b64}},{text:buildPrompt(lang)}]}],generationConfig:{temperature:0.1,maxOutputTokens:8192}};
    let lastErr=null;
    for(const model of GM_MODELS){
      console.log('[MyBooksApp] Trying model:',model,'| language:',lang,'| key prefix:',k.slice(0,5)+'…');
      let r;
      try{r=await fetch(gemUrl(model,k),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});}
      catch(netErr){
        console.error('[MyBooksApp] Network error:',netErr);
        console.log('Current API Key being used (first 5 chars):',k.substring(0,5));
        throw new Error(`Network error: ${netErr.message}`);
      }
      if(!r.ok){
        const e=await r.json().catch(()=>({}));
        console.error(`[MyBooksApp] Model ${model} error:`,JSON.stringify(e,null,2));
        console.log('Current API Key being used (first 5 chars):',k.substring(0,5));
        const msg=e.error?.message||`HTTP ${r.status}`;
        if(r.status===404){lastErr=new Error(`Model not found (404): ${model} — ${msg}`);console.warn('[MyBooksApp]',model,'not found, trying next...');continue;}
        // limit:0 means free-tier quota is zero for this model/region — try next model
        if(r.status===429&&msg.includes('limit: 0')){lastErr=new Error(`Free tier unavailable (429): ${model} — ${msg}`);console.warn('[MyBooksApp]',model,'has limit:0 on free tier, trying next...');continue;}
        if(r.status===429)throw new Error(`Quota/rate limit (429): ${msg}`);
        throw new Error(`API error ${r.status}: ${msg}`);
      }
      const d=await r.json();
      console.log('[MyBooksApp] Success with model:',model,'| candidates:',d.candidates?.length??0);
      const txt=d.candidates?.[0]?.content?.parts?.[0]?.text||'{"highlights":[]}';
      const m=txt.match(/\{[\s\S]*\}/);
      if(!m){console.warn('[MyBooksApp] No JSON in response:',txt);return{highlights:[]};}
      return JSON.parse(m[0]);
    }
    console.log('Current API Key being used (first 5 chars):',k.substring(0,5));
    throw lastErr||new Error('All Gemini model variants failed.');
  };

  const processAll=async()=>{
    const pend=photos.filter(p=>p.status==='pending');
    if(!pend.length)return;
    setProcessing(true);
    for(const ph of pend){
      setPhotos(p=>p.map(x=>x.id===ph.id?{...x,status:'processing'}:x));
      try{const res=await analyze(ph);setPhotos(p=>p.map(x=>x.id===ph.id?{...x,status:'done',result:res}:x));}
      catch(e){setPhotos(p=>p.map(x=>x.id===ph.id?{...x,status:'error',error:e.message}:x));}
    }
    setProcessing(false);
  };

  const retry=async(photo)=>{
    setPhotos(p=>p.map(x=>x.id===photo.id?{...x,status:'processing',error:null}:x));
    try{const r=await analyze(photo);setPhotos(p=>p.map(x=>x.id===photo.id?{...x,status:'done',result:r}:x));}
    catch(e){setPhotos(p=>p.map(x=>x.id===photo.id?{...x,status:'error',error:e.message}:x));}
  };

  const doneCount=photos.filter(p=>p.status==='done').length;
  const pendingCount=photos.filter(p=>p.status==='pending').length;
  const procCount=photos.filter(p=>p.status==='processing').length;
  const totalHL=photos.filter(p=>p.status==='done').reduce((s,p)=>s+(p.result?.highlights?.length||0),0);
  const allDone=photos.length>0&&pendingCount===0&&procCount===0;

  const goContinue=()=>{
    const pend=[];
    photos.forEach(ph=>{if(ph.status==='done'&&ph.result?.highlights){ph.result.highlights.forEach(h=>{pend.push({id:genId(),bookId,markedText:h.markedText||'',fullContext:h.fullContext||'',pageNumber:h.pageNumber||null,photoOriginal:ph.preview,isFavorite:false,tags:[],dateAdded:new Date().toISOString(),isEdited:false});});}});
    navigate('review-highlights',{bookId,pendingHighlights:pend});
  };

  return (
    <div style={{minHeight:'100dvh',background:'var(--bg)'}}>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',borderBottom:'1px solid var(--bd)',padding:'calc(14px + env(safe-area-inset-top,0px)) 20px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button className="back-btn" onClick={()=>navigate('book-detail',{bookId})}>{IC.back} Back</button>
        <div style={{textAlign:'center'}}>
          <h1 style={{margin:0,fontSize:16,fontWeight:600,color:'var(--t1)'}}>Add Highlights</h1>
          <p style={{margin:0,fontSize:11,color:'var(--t3)'}}>{truncate(book.title,24)}</p>
        </div>
        <div style={{width:60}}/>
      </div>

      <div style={{padding:'20px'}} className="pb-nav">
        {/* Instructions */}
        <div className="card" style={{padding:'15px 16px',marginBottom:18,background:'rgba(194,101,26,0.04)',borderColor:'rgba(194,101,26,0.15)'}}>
          <p style={{margin:'0 0 7px',fontSize:13,fontWeight:600,color:'var(--t1)'}}>How it works</p>
          <ul style={{margin:0,paddingLeft:16,fontSize:12,color:'var(--t2)',lineHeight:1.75}}>
            <li>Take photos of book pages with pencil lines in the right margin</li>
            <li>AI will extract all marked passages automatically</li>
            <li>Review and edit before saving to your library</li>
          </ul>
        </div>

        {/* Upload buttons */}
        <div style={{display:'flex',gap:10,marginBottom:18}}>
          <label htmlFor="ph-file" className="btn btn-s" style={{flex:1,cursor:'pointer'}}>
            {IC.photo} Choose Photos
          </label>
          <label htmlFor="ph-cam" className="btn btn-p" style={{flex:1,cursor:'pointer'}}>
            {IC.cam} Take Photo
          </label>
        </div>
        <input id="ph-file" type="file" accept="image/*" multiple onChange={e=>handleFiles(e.target.files)} style={{display:'none'}}/>
        <input id="ph-cam" type="file" accept="image/*" capture="environment" onChange={e=>handleFiles(e.target.files)} style={{display:'none'}}/>

        {/* Photo queue */}
        {photos.length>0&&(
          <div style={{marginBottom:18}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <p className="section-label" style={{margin:0}}>Queue ({photos.length})</p>
              {doneCount>0&&<span style={{fontSize:12,color:'#22c55e',fontWeight:500}}>{totalHL} highlight{totalHL!==1?'s':''} found</span>}
            </div>
            <div className="photo-queue">
              {photos.map(ph=>(
                <div key={ph.id} className="photo-item">
                  <img src={ph.preview} alt="page" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                  {/* Status overlay */}
                  <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:ph.status==='processing'?'rgba(26,22,21,0.55)':ph.status==='done'?'rgba(34,197,94,0.18)':ph.status==='error'?'rgba(184,50,50,0.55)':'transparent',transition:'background 0.3s'}}>
                    {ph.status==='processing'&&<Spin/>}
                    {ph.status==='done'&&<div style={{background:'#22c55e',borderRadius:'50%',width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',color:'white'}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg></div>}
                    {ph.status==='error'&&<div style={{color:'white',textAlign:'center',padding:4}}>{IC.err}<span style={{display:'block',fontSize:9,marginTop:2}}>Error</span>{ph.error&&<span style={{display:'block',fontSize:8,marginTop:2,opacity:0.85,maxWidth:120,wordBreak:'break-word'}}>{ph.error}</span>}</div>}
                  </div>
                  {ph.status==='done'&&ph.result?.highlights?.length>0&&<div style={{position:'absolute',top:5,left:5,background:'var(--ac)',color:'white',borderRadius:9,padding:'2px 6px',fontSize:10,fontWeight:600}}>{ph.result.highlights.length}</div>}
                  {(ph.status==='pending'||ph.status==='error')&&<button onClick={()=>setPhotos(p=>p.filter(x=>x.id!==ph.id))} style={{position:'absolute',top:4,right:4,background:'rgba(26,22,21,0.65)',border:'none',borderRadius:'50%',width:20,height:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'white',padding:0}}>{IC.x}</button>}
                  {ph.status==='error'&&<button onClick={()=>retry(ph)} style={{position:'absolute',bottom:4,left:'50%',transform:'translateX(-50%)',background:'var(--ac)',border:'none',borderRadius:6,padding:'2px 8px',cursor:'pointer',color:'white',fontSize:9,fontWeight:500,whiteSpace:'nowrap'}}>Retry</button>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Action */}
        {photos.length>0&&(
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {pendingCount>0&&!processing&&<button className="btn btn-p btn-w btn-lg" onClick={processAll}>{IC.play} Analyze {pendingCount} Photo{pendingCount!==1?'s':''} with AI</button>}
            {processing&&<button className="btn btn-p btn-w btn-lg" disabled><Spin/> Analyzing…</button>}
            {allDone&&totalHL>0&&<button className="btn btn-p btn-w btn-lg" onClick={goContinue}>Review {totalHL} Highlight{totalHL!==1?'s':''} {IC.next}</button>}
            {allDone&&totalHL===0&&<div className="card" style={{padding:16,textAlign:'center'}}><p style={{margin:0,fontSize:13,color:'var(--t2)'}}>No marked text detected. Make sure photos show clear pencil lines in the right margin beside the text.</p></div>}
          </div>
        )}

        {photos.length===0&&(
          <div className="empty">
            <div className="empty-icon" style={{width:72,height:72,borderRadius:22}}>{IC.cam}</div>
            <p style={{margin:0,fontSize:14,color:'var(--t2)',lineHeight:1.6}}>Select photos of book pages to start extracting highlights</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── ReviewHighlightsPage ─── */
function ReviewHighlightsPage({navigate, bookId, pendingHighlights}) {
  const [items,setItems]=useState(()=>pendingHighlights.map(h=>({...h})));
  const [saving,setSaving]=useState(false);
  const [globalTags]=useState(getAllTags);
  const book=getBook(bookId);

  if(!book){navigate('library');return null;}
  if(!pendingHighlights.length){navigate('book-detail',{bookId});return null;}

  const upd=(id,field,val)=>setItems(p=>p.map(h=>h.id===id?{...h,[field]:val,isEdited:true}:h));
  const remove=(id)=>setItems(p=>p.filter(h=>h.id!==id));
  const tagAdd=(id,t)=>setItems(p=>p.map(h=>h.id===id?{...h,tags:[...new Set([...(h.tags||[]),t.trim()])].filter(Boolean)}:h));
  const tagRm=(id,t)=>setItems(p=>p.map(h=>h.id===id?{...h,tags:(h.tags||[]).filter(x=>x!==t)}:h));
  const favTog=(id)=>setItems(p=>p.map(h=>h.id===id?{...h,isFavorite:!h.isFavorite}:h));

  const saveAll=async()=>{
    if(!items.length){navigate('book-detail',{bookId});return;}
    setSaving(true);
    try{for(const h of items){if(h.markedText?.trim()){addHighlight(h);(h.tags||[]).forEach(t=>addTag(t));}}navigate('book-detail',{bookId});}
    catch(e){console.error(e);}
    finally{setSaving(false);}
  };

  return (
    <div style={{minHeight:'100dvh',background:'var(--bg)'}}>
      <div style={{position:'sticky',top:0,zIndex:10,background:'var(--bg)',borderBottom:'1px solid var(--bd)',padding:'calc(14px + env(safe-area-inset-top,0px)) 20px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button className="back-btn" onClick={()=>navigate('book-detail',{bookId})}>{IC.back} Discard</button>
        <div style={{textAlign:'center'}}>
          <h1 style={{margin:0,fontSize:16,fontWeight:600,color:'var(--t1)'}}>Review</h1>
          <p style={{margin:0,fontSize:11,color:'var(--t3)'}}>{items.length} extracted</p>
        </div>
        <button className="btn btn-p" style={{padding:'0 14px',height:36,fontSize:13}} onClick={saveAll} disabled={saving}>
          {saving?<Spin/>:'Save All'}
        </button>
      </div>

      {/* Book bar */}
      <div style={{padding:'10px 20px',background:'var(--card)',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:10}}>
        {book.coverPhoto&&<img src={book.coverPhoto} alt={book.title} style={{width:26,height:37,objectFit:'cover',borderRadius:3,flexShrink:0}}/>}
        <div>
          <p style={{margin:0,fontSize:13,fontWeight:600,color:'var(--t1)'}}>{book.title}</p>
          <p style={{margin:0,fontSize:11,color:'var(--t3)'}}>by {book.author}</p>
        </div>
      </div>

      <div style={{padding:'10px 20px 24px'}} className="pb-nav">
        {items.length===0
          ? <EmptyState title="All removed" description="No highlights remaining." action={<button className="btn btn-p" onClick={()=>navigate('book-detail',{bookId})}>Back to Book</button>}/>
          : items.map((h,i)=><ReviewItem key={h.id} h={h} idx={i} globalTags={globalTags} onUpd={upd} onDel={remove} onTagAdd={tagAdd} onTagRm={tagRm} onFav={favTog}/>)
        }
      </div>

      {items.length>0&&(
        <div style={{position:'sticky',bottom:'calc(64px + env(safe-area-inset-bottom,0px))',padding:'16px 20px',background:'linear-gradient(to top, var(--bg) 75%, transparent)'}}>
          <button className="btn btn-p btn-w btn-lg" onClick={saveAll} disabled={saving}>
            {saving?<><Spin/> Saving…</>:<>Save {items.length} Highlight{items.length!==1?'s':''} {IC.check}</>}
          </button>
        </div>
      )}
    </div>
  );
}

function ReviewItem({h, idx, globalTags, onUpd, onDel, onTagAdd, onTagRm, onFav}) {
  const [tagInp,setTagInp]=useState('');
  const [showTagInp,setShowTagInp]=useState(false);
  const [showPhoto,setShowPhoto]=useState(false);
  const dir=getDir(h.markedText);
  const rtl=dir==='rtl';

  const doAddTag=()=>{const t=tagInp.trim();if(t){onTagAdd(h.id,t);setTagInp('');setShowTagInp(false);}};

  return (
    <div className="card fade-up" style={{marginBottom:14,padding:'16px',borderLeft:rtl?'none':`2.5px solid var(--ac)`,borderRight:rtl?'2.5px solid var(--ac)':'none',direction:dir}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,flexDirection:rtl?'row-reverse':'row'}}>
        <span className="section-label" style={{margin:0,color:'var(--ac)'}}>#{String(idx+1).padStart(2,'0')}</span>
        <div style={{display:'flex',gap:4,flexDirection:rtl?'row-reverse':'row'}}>
          <button onClick={()=>onFav(h.id)} style={{background:'none',border:'none',cursor:'pointer',color:h.isFavorite?'var(--gold)':'var(--t3)',padding:6,borderRadius:6,display:'flex',alignItems:'center'}}>
            {IC.star(h.isFavorite)}
          </button>
          <button onClick={()=>onDel(h.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:6,borderRadius:6,display:'flex',alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.color='var(--err)'} onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>
            {IC.trash}
          </button>
        </div>
      </div>

      <label className="section-label" style={{display:'block',marginBottom:6,textAlign:rtl?'right':'left'}}>Marked Text</label>
      <div style={{position:'relative'}}>
        <span style={{position:'absolute',top:-10,right:rtl?2:'auto',left:rtl?'auto':2,fontSize:52,lineHeight:1,color:'var(--ac)',opacity:0.18,fontFamily:"'Noto Serif Hebrew',serif",pointerEvents:'none',userSelect:'none',zIndex:0}}>"</span>
        <textarea value={h.markedText} onChange={e=>onUpd(h.id,'markedText',e.target.value)} className="inp" style={{position:'relative',zIndex:1,marginBottom:12,fontSize:15,fontWeight:500,minHeight:80,direction:dir,textAlign:rtl?'right':'left',fontFamily:rtl?"'Noto Serif Hebrew',serif":undefined,lineHeight:1.7}} placeholder="The underlined or bracketed text…"/>
      </div>

      <label className="section-label" style={{display:'block',marginBottom:6,textAlign:rtl?'right':'left'}}>Context Paragraph</label>
      <textarea value={h.fullContext} onChange={e=>onUpd(h.id,'fullContext',e.target.value)} className="inp" style={{marginBottom:12,fontSize:12,color:'var(--t2)',minHeight:60,direction:dir,textAlign:rtl?'right':'left'}} placeholder="The surrounding paragraph…"/>

      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12,flexDirection:rtl?'row-reverse':'row'}}>
        <label style={{fontSize:12,color:'var(--t2)',whiteSpace:'nowrap'}}>Page</label>
        <input type="number" value={h.pageNumber||''} onChange={e=>onUpd(h.id,'pageNumber',e.target.value?parseInt(e.target.value):null)} className="inp" placeholder="—" style={{width:72,textAlign:'center',height:36,fontSize:13}}/>
      </div>

      <div style={{display:'flex',flexWrap:'wrap',gap:6,alignItems:'center',marginBottom:8,flexDirection:rtl?'row-reverse':'row'}}>
        {(h.tags||[]).map(t=><TagPill key={t} tag={t} onRemove={()=>onTagRm(h.id,t)}/>)}
        {showTagInp
          ? <div style={{display:'flex',gap:4,alignItems:'center'}}>
              <input value={tagInp} onChange={e=>setTagInp(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doAddTag();if(e.key==='Escape'){setShowTagInp(false);setTagInp('');}}} onBlur={()=>{if(!tagInp.trim())setShowTagInp(false);}} placeholder="tag" autoFocus list={`rv-tags-${h.id}`} style={{border:'1.5px solid var(--ac)',borderRadius:20,padding:'3px 10px',fontSize:12,fontFamily:'Outfit,sans-serif',color:'var(--t1)',background:'var(--card)',outline:'none',width:90}}/>
              <datalist id={`rv-tags-${h.id}`}>{globalTags.map(t=><option key={t} value={t}/>)}</datalist>
              <button onClick={doAddTag} style={{background:'var(--ac)',border:'none',borderRadius:'50%',width:22,height:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'white',padding:0}}>{IC.check}</button>
            </div>
          : <button onClick={()=>setShowTagInp(true)} className="tag" style={{background:'none',border:'1px dashed var(--bd)',cursor:'pointer',color:'var(--t3)'}}>{IC.plus} add tag</button>
        }
      </div>

      {h.photoOriginal&&(
        <div>
          <button onClick={()=>setShowPhoto(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,color:'var(--t2)',display:'flex',alignItems:'center',gap:4,padding:'4px 0',flexDirection:rtl?'row-reverse':'row'}}>
            <span style={{transform:showPhoto?'rotate(180deg)':'none',transition:'transform 0.2s',display:'inline-block'}}>{IC.down}</span>
            {showPhoto?'Hide':'Show'} source photo
          </button>
          {showPhoto&&<img src={h.photoOriginal} alt="Source" style={{width:'100%',display:'block',borderRadius:8,marginTop:8}}/>}
        </div>
      )}
    </div>
  );
}

/* ─── SettingsPage ─── */
function SettingsPage({navigate}) {
  const [tags,setTags]=useState(getAllTags);
  const [settings,setSettings]=useState(getSettings);
  const [sz,setSz]=useState(getStorageSize);
  const [showClear,setShowClear]=useState(false);
  const [newTag,setNewTag]=useState('');
  const [renamingTag,setRenamingTag]=useState(null);
  const [renameVal,setRenameVal]=useState('');
  const [importErr,setImportErr]=useState(null);
  const [importOk,setImportOk]=useState(false);
  const [apiKey,setApiKey]=useState(getApiKey);
  const [apiSaved,setApiSaved]=useState(false);
  const [showKey,setShowKey]=useState(false);
  const importRef=useRef(null);

  const saveKey=()=>{saveApiKey(apiKey);setApiSaved(true);setTimeout(()=>setApiSaved(false),2500);};
  const doExport=()=>{const j=exportData();const b=new Blob([j],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`bookmarks-${new Date().toISOString().slice(0,10)}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);};
  const doImport=async(e)=>{const f=e.target.files?.[0];if(!f)return;setImportErr(null);setImportOk(false);const r=new FileReader();r.onload=ev=>{try{importData(ev.target.result);setImportOk(true);setTags(getAllTags());setSettings(getSettings());setSz(getStorageSize());setTimeout(()=>setImportOk(false),3000);}catch(er){setImportErr(er.message);}};r.readAsText(f);e.target.value='';};
  const doClear=()=>{clearAllData();setTags([]);setSz(getStorageSize());};
  const doAddTag=()=>{const t=newTag.trim();if(t){addTag(t);setTags(getAllTags());setNewTag('');}};
  const doRename=()=>{if(!renamingTag||!renameVal.trim())return;renameTag(renamingTag,renameVal.trim());setTags(getAllTags());setRenamingTag(null);setRenameVal('');};
  const doDelTag=(t)=>{deleteTag(t);setTags(getAllTags());};
  const setSetting=(k,v)=>{const s=updateSettings({[k]:v});setSettings(s);};

  const szPct=Math.min((sz/(5*1024*1024))*100,100);

  return (
    <div style={{minHeight:'100dvh',background:'var(--bg)'}}>
      <div style={{padding:'calc(20px + env(safe-area-inset-top,0px)) 20px 18px',borderBottom:'1px solid var(--bd)'}}>
        <h1 style={{margin:0,fontSize:28,fontWeight:700,color:'var(--t1)',letterSpacing:'-0.03em'}}>Settings</h1>
      </div>

      <div style={{padding:'20px'}} className="pb-nav">

        {/* Storage */}
        <p className="section-label">Storage</p>
        <div className="settings-card" style={{marginBottom:22}}>
          <div className="settings-row" style={{flexDirection:'column',alignItems:'stretch',gap:8}}>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:13,color:'var(--t2)'}}>Used</span>
              <span style={{fontSize:13,fontWeight:600,color:'var(--t1)'}}>{fmtBytes(sz)} / ~5 MB</span>
            </div>
            <div className="progress-track">
              <div className="progress-bar" style={{width:szPct+'%',background:szPct>80?'var(--err)':'var(--ac)'}}/>
            </div>
          </div>
        </div>

        {/* Preferences */}
        <p className="section-label">Preferences</p>
        <div className="settings-card" style={{marginBottom:22}}>
          <div className="settings-row">
            <span style={{fontSize:14,color:'var(--t1)'}}>Default Language</span>
            <div className="seg" style={{width:'auto'}}>
              {[{v:'en',l:'EN'},{v:'he',l:'HE'}].map(o=>(
                <button key={o.v} type="button" className={`seg-btn${settings.defaultLanguage===o.v?' active':''}`} onClick={()=>setSetting('defaultLanguage',o.v)} style={{padding:'6px 14px'}}>{o.l}</button>
              ))}
            </div>
          </div>
        </div>

        {/* AI / API Key */}
        <p className="section-label">AI — Gemini API Key</p>
        <div className="settings-card" style={{marginBottom:22}}>
          <div style={{padding:'14px 16px'}}>
            <p style={{margin:'0 0 12px',fontSize:13,color:'var(--t2)',lineHeight:1.6}}>Stored only on this device. Used to extract highlighted text from photos.</p>
            <div style={{display:'flex',gap:8,marginBottom:8}}>
              <div style={{flex:1,position:'relative'}}>
                <input type={showKey?'text':'password'} className="inp" placeholder="AIza…" value={apiKey} onChange={e=>setApiKey(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveKey();}} style={{paddingRight:40,fontSize:13,height:40}}/>
                <button type="button" onClick={()=>setShowKey(v=>!v)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:0,display:'flex',alignItems:'center'}}>
                  {showKey?IC.eyeOff:IC.eye}
                </button>
              </div>
              <button className="btn btn-p" style={{flexShrink:0,padding:'0 16px',height:40,fontSize:13}} onClick={saveKey}>
                {apiSaved?<>{IC.check} Saved</>:'Save'}
              </button>
            </div>
            {apiKey
              ? <p style={{margin:0,fontSize:12,color:'#16a34a',display:'flex',alignItems:'center',gap:4}}>{IC.check} API key set</p>
              : <p style={{margin:0,fontSize:12,color:'var(--t3)'}}>No key set — photos cannot be processed until you add one.</p>
            }
          </div>
        </div>

        {/* Tags */}
        <p className="section-label">Tags</p>
        <div className="settings-card" style={{marginBottom:22}}>
          <div style={{padding:'14px 16px'}}>
            <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:12}}>
              {tags.length===0
                ? <p style={{margin:0,fontSize:13,color:'var(--t3)'}}>No tags yet.</p>
                : tags.map(t=>(
                  <div key={t} style={{display:'flex',alignItems:'center',gap:4}}>
                    {renamingTag===t
                      ? <div style={{display:'flex',gap:4,alignItems:'center'}}>
                          <input value={renameVal} onChange={e=>setRenameVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doRename();if(e.key==='Escape'){setRenamingTag(null);setRenameVal('');}} } autoFocus style={{border:'1.5px solid var(--ac)',borderRadius:20,padding:'4px 10px',fontSize:12,fontFamily:'Outfit,sans-serif',color:'var(--t1)',background:'var(--card)',outline:'none',width:100}}/>
                          <button onClick={doRename} style={{background:'var(--ac)',border:'none',borderRadius:'50%',width:24,height:24,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'white',padding:0}}>{IC.check}</button>
                          <button onClick={()=>{setRenamingTag(null);setRenameVal('');}} style={{background:'var(--bg2)',border:'none',borderRadius:'50%',width:24,height:24,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t2)',padding:0}}>{IC.x}</button>
                        </div>
                      : <div style={{display:'flex',gap:4,alignItems:'center'}}>
                          <span className="tag">{t}</span>
                          <button onClick={()=>{setRenamingTag(t);setRenameVal(t);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:4,borderRadius:4,display:'flex',alignItems:'center'}}>{IC.edit}</button>
                          <button onClick={()=>doDelTag(t)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--t3)',padding:4,borderRadius:4,display:'flex',alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.color='var(--err)'} onMouseLeave={e=>e.currentTarget.style.color='var(--t3)'}>{IC.x}</button>
                        </div>
                    }
                  </div>
                ))
              }
            </div>
            <div style={{display:'flex',gap:8}}>
              <input type="text" className="inp" placeholder="New tag…" value={newTag} onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')doAddTag();}} style={{fontSize:13,height:40}}/>
              <button className="btn btn-s" onClick={doAddTag} style={{padding:'0 16px',height:40,flexShrink:0}}>Add</button>
            </div>
          </div>
        </div>

        {/* Data */}
        <p className="section-label">Data</p>
        <div className="settings-card" style={{marginBottom:22}}>
          <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
            {importErr&&<div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:8,padding:'10px 12px',fontSize:13,color:'var(--err)'}}>{importErr}</div>}
            {importOk&&<div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'10px 12px',fontSize:13,color:'#16a34a'}}>Data imported successfully.</div>}
            <button className="btn btn-s btn-w" onClick={doExport}>{IC.export} Export as JSON</button>
            <label htmlFor="imp-in" className="btn btn-s btn-w" style={{cursor:'pointer'}}>{IC.import} Import from JSON</label>
            <input id="imp-in" ref={importRef} type="file" accept=".json,application/json" onChange={doImport} style={{display:'none'}}/>
            <button className="btn btn-d btn-w" onClick={()=>setShowClear(true)}>{IC.trash} Clear All Data</button>
          </div>
        </div>

        {/* About */}
        <p className="section-label">About</p>
        <div className="settings-card">
          <div style={{padding:'14px 16px',fontSize:13,color:'var(--t2)',lineHeight:1.65}}>
            <p style={{margin:'0 0 6px'}}><strong style={{color:'var(--t1)',fontWeight:600}}>BookMarks</strong> — personal reading journal</p>
            <p style={{margin:'0 0 6px'}}>Photograph book pages with underlined passages and let AI extract your highlights automatically.</p>
            <p style={{margin:0,color:'var(--t3)'}}>All data stored locally on your device.</p>
          </div>
        </div>
      </div>

      <ConfirmModal isOpen={showClear} onClose={()=>setShowClear(false)} onConfirm={doClear} title="Clear All Data" message="This will permanently delete all books, highlights, and settings. Consider exporting first." confirmLabel="Clear Everything" danger/>
    </div>
  );
}

/* ─── App ─── */
const TAB_PAGES=['library','highlights','settings'];

function App() {
  const [page,setPage]=useState('library');
  const [params,setParams]=useState({});
  const [tab,setTab]=useState('library');

  const navigate=useCallback((p,prms={})=>{
    setPage(p);setParams(prms);
    if(TAB_PAGES.includes(p))setTab(p);
    window.scrollTo({top:0,behavior:'instant'});
  },[]);

  const render=()=>{
    switch(page){
      case 'library':           return <LibraryPage navigate={navigate}/>;
      case 'highlights':        return <AllHighlightsPage navigate={navigate}/>;
      case 'settings':          return <SettingsPage navigate={navigate}/>;
      case 'book-detail':       return <BookDetailPage navigate={navigate} bookId={params.bookId}/>;
      case 'add-book':          return <AddBookPage navigate={navigate}/>;
      case 'add-highlights':    return <AddHighlightsPage navigate={navigate} bookId={params.bookId}/>;
      case 'review-highlights': return <ReviewHighlightsPage navigate={navigate} bookId={params.bookId} pendingHighlights={params.pendingHighlights||[]}/>;
      default:                  return <LibraryPage navigate={navigate}/>;
    }
  };

  return (
    <div className="page">
      <main style={{paddingBottom:'calc(64px + env(safe-area-inset-bottom,0px))'}}>
        {render()}
      </main>
      <BottomNav activeTab={tab} navigate={navigate}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
